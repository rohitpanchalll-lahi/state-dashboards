  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State Dashboard Portal — Lend-A-Hand India</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

  <style>
    /* ── Reset & root ────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #F5EDE6;
      --surface: #FDFAF7;
      --brand:   #7F4722;
      --light:   #A8622E;
      --fill:    #C9987A;    /* map state default – warm terracotta */
      --fill-h:  #7F4722;    /* map state hover   – brand brown    */
      --fill-none: #DDD3CE;  /* state with no dashboard – muted    */
      --stroke:  #F5EDE6;    /* stroke = bg so seams vanish        */
      --t1:      #2C1505;
      --t2:      #8A6650;
      --t3:      #C4A48A;
      --brd:     rgba(127,71,34,0.16);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--t1);
    }

    /* ── Shared header shell ─────────────────────────── */
    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--brd);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      flex-shrink: 0;
    }

    .hdr-logo img {
      height: 42px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .hdr-center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .hdr-center h1 {
      font-family: "Syne", sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -0.3px;
    }

    .flag-strip { display: flex; gap: 3px; }
    .flag-strip i {
      display: block;
      width: 7px; height: 28px;
      border-radius: 2px;
      opacity: 0.6;
      font-style: normal;
    }

    /* ── Subheading band ─────────────────────────────── */
    .subheading {
      background: var(--bg);
      border-bottom: 1px solid var(--brd);
      padding: 7px 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .subheading p {
      font-size: 12.5px;
      font-weight: 300;
      font-style: italic;
      color: var(--t2);
      letter-spacing: 0.1px;
    }

    /* ── MAP VIEW ────────────────────────────────────── */
    #map-view {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .map-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #map-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    #map-svg path {
      fill: var(--fill);
      stroke: var(--stroke);
      stroke-width: 0.9;
      cursor: pointer;
      transition: fill 0.18s ease;
    }

    #map-svg path.has-dash:hover { fill: var(--fill-h); }

    #map-svg path.no-dash {
      fill: var(--fill-none);
      cursor: default;
    }

    /* subtle inner shadow on map area for depth */
    .map-area::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 60px rgba(127,71,34,0.07);
      pointer-events: none;
    }

    /* ── Tooltip ─────────────────────────────────────── */
    #tooltip {
      position: fixed;
      display: none;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--brand);
      border-radius: 8px;
      padding: 5px 14px;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--t1);
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 3px 14px rgba(127,71,34,0.2);
    }

    /* ── Map status (loading / error) ────────────────── */
    #map-status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
    }

    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--brd);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    #map-status p { font-size: 13px; color: var(--t2); }

    /* ── DASHBOARD VIEW ──────────────────────────────── */
    #dash-view {
      height: 100vh;
      display: none;
      flex-direction: column;
    }

    #dash-view.active { display: flex; }

    .dash-left {
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1;
    }

    #back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: var(--bg);
      border: 1px solid var(--brd);
      border-radius: 7px;
      color: var(--t1);
      font-family: "Plus Jakarta Sans", inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      white-space: nowrap;
    }
    #back-btn:hover {
      border-color: var(--brand);
      background: rgba(127,71,34,0.06);
    }

    .dash-breadcrumb {
      font-size: 11.5px;
      color: var(--t2);
      z-index: 1;
    }
    .dash-breadcrumb em {
      font-style: normal;
      color: var(--light);
      font-weight: 600;
    }

    #dash-body {
      flex: 1;
      overflow: hidden;
      background: #fff;
    }

    #dash-body iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* ── Placeholder (no URL set yet) ────────────────── */
    .placeholder {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 40px;
      background: var(--bg);
    }
    .placeholder .ph-icon { font-size: 48px; }
    .placeholder h2 {
      font-family: "Syne", sans-serif;
      font-size: 22px;
      color: var(--t1);
    }
    .placeholder p {
      font-size: 13px;
      color: var(--t2);
      max-width: 440px;
      text-align: center;
      line-height: 1.75;
    }
    .placeholder code {
      background: var(--surface);
      border: 1px solid var(--brd);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11.5px;
      color: var(--light);
    }

    /* ── Content area (map + kpi panel side by side) ── */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    .map-area { flex: 1; }

    /* ── KPI panel ──────────────────────────────────── */
    .kpi-panel {
      width: 258px;
      flex-shrink: 0;
      background: var(--bg);
      border-left: 1px solid var(--brd);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 20px 16px 16px;
      gap: 14px;
    }

    .kpi-panel-hd {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--brd);
    }

    .kpi-panel-hd span {
      font-family: "Syne", sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--t1);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .kpi-panel-hd::before {
      content: "";
      display: block;
      width: 4px;
      height: 16px;
      background: var(--brand);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-content: start;
    }

    .kpi-box {
      background: var(--surface);
      border: 1px solid var(--brd);
      border-top: 2.5px solid var(--brand);
      border-radius: 10px;
      padding: 14px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: box-shadow 0.22s ease, transform 0.22s cubic-bezier(0.22,1,0.36,1);
    }

    .kpi-box:hover {
      transform: translateY(-3px) scale(1.025);
      box-shadow: 0 6px 22px rgba(127,71,34,0.17);
    }

    .kpi-value {
      font-family: "Syne", sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--brand);
      line-height: 1;
      letter-spacing: -0.5px;
    }

    .kpi-label {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.35;
    }

    /* ── Responsive: tablet ── */
    @media (max-width: 880px) {
      .kpi-panel { width: 218px; padding: 16px 12px 12px; }
      .kpi-value { font-size: 23px; }
      .kpi-box   { padding: 12px 10px 10px; }
    }

    @media (max-width: 700px) {
      .kpi-panel { width: 190px; padding: 14px 10px 10px; gap: 10px; }
      .kpi-value { font-size: 21px; }
      .kpi-label { font-size: 9.5px; }
      .kpi-box   { padding: 10px 8px 8px; }
    }

    /* ── Responsive: mobile — KPI strip on top, map below ── */
    @media (max-width: 580px) {
      .content-area { flex-direction: column; }
      .kpi-panel {
        order: -1;
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--brd);
        padding: 10px 14px 12px;
        gap: 7px;
        flex-shrink: 0;
      }
      .kpi-panel-hd         { padding-bottom: 7px; }
      .kpi-panel-hd span    { font-size: 11px; }
      .kpi-panel-hd::before { height: 13px; }
      .kpi-grid  { grid-template-columns: repeat(3, 1fr); gap: 7px; }
      .kpi-box   { padding: 9px 8px 7px; border-radius: 7px; }
      .kpi-value { font-size: 18px; letter-spacing: -0.3px; }

  "Chandigarh":                  "YOUR_POWER_BI_EMBED_URL",
  "Puducherry":                  "YOUR_POWER_BI_EMBED_URL",
  "Andaman and Nicobar Islands": "YOUR_POWER_BI_EMBED_URL",
  "Lakshadweep":                 "YOUR_POWER_BI_EMBED_URL",
};

/* ── Name normalisation ── */
const NORMALIZE = {
  "Jammu And Kashmir":   "Jammu & Kashmir",
  "Jammu and Kashmir":   "Jammu & Kashmir",
  "NCT of Delhi":        "Delhi",
  "NCT Of Delhi":        "Delhi",
  "Andaman And Nicobar": "Andaman and Nicobar Islands",
  "Andaman and Nicobar": "Andaman and Nicobar Islands",
  "Uttaranchal":         "Uttarakhand",
  "Orissa":              "Odisha",
};
const norm = n => NORMALIZE[n] || n;

const GEOJSON_SOURCES = [
  "https://raw.githubusercontent.com/geohacker/india/master/state/india_state.geo.json",
  "https://raw.githubusercontent.com/Subhash9325/GeoJson-Data-of-Indian-States/master/Indian_States",
];

/* ── Elements ── */
const mapSvg    = document.getElementById("map-svg");
const tooltip   = document.getElementById("tooltip");
const mapStatus = document.getElementById("map-status");

/* ════════════════════════════
   Load & render map
   ════════════════════════════ */
async function loadGeoJSON() {
  for (const url of GEOJSON_SOURCES) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const json = await res.json();
      const list = json.features || [];
      if (list.length) return list;
    } catch { /* try next */ }
  }
  return null;
}

function renderMap(features) {
  const svg = d3.select(mapSvg);
  const W = mapSvg.clientWidth, H = mapSvg.clientHeight;
  if (!W || !H) return;
  svg.attr("viewBox", `0 0 ${W} ${H}`);
  svg.selectAll("*").remove();

  /* detect property key for state name */
  const props = features[0]?.properties || {};
  const nameKey = ["NAME_1","ST_NM","name","NAME","STNAME"]
    .find(k => props[k]) || Object.keys(props)[0];

  /* fit to mainland (exclude distant islands for better scale) */
  const mainland = features.filter(f => {
    const n = norm(f.properties[nameKey] || "");
    return !["Lakshadweep","Andaman and Nicobar Islands"].includes(n);
  });
  const base = { type: "FeatureCollection",
                 features: mainland.length > 5 ? mainland : features };

  const proj   = d3.geoMercator().fitExtent([[24,24],[W-24,H-24]], base);
  const pathFn = d3.geoPath().projection(proj);

  svg.selectAll("path")
    .data(features)
    .join("path")
    .attr("d", pathFn)
    .attr("class", d => {
      const name = norm(d.properties[nameKey] || "");
      const url  = DASHBOARDS[name] || DASHBOARDS[name?.replace("&","and")];
      return (url && url !== "YOUR_POWER_BI_EMBED_URL") ? "has-dash" : "no-dash";
    })
    .on("mousemove", (ev, d) => {
      const name   = norm(d.properties[nameKey] || "Unknown");
      const url    = DASHBOARDS[name] || DASHBOARDS[name?.replace("&","and")];
      const isLive = url && url !== "YOUR_POWER_BI_EMBED_URL";
      tooltip.textContent = isLive ? name : `${name} — coming soon`;
      tooltip.style.display = "block";
      tooltip.style.left = (ev.clientX + 15) + "px";
      tooltip.style.top  = (ev.clientY - 12) + "px";
    })
    .on("mouseleave", () => {
      tooltip.style.display = "none";
    })
    .on("click", (ev, d) => {
      const name   = norm(d.properties[nameKey] || "Unknown");
      const url    = DASHBOARDS[name] || DASHBOARDS[name?.replace("&","and")];
      const isLive = url && url !== "YOUR_POWER_BI_EMBED_URL";
      if (!isLive) return;          /* greyed states are not clickable */
      tooltip.style.display = "none";
      openDashboard(name);
    });
}

/* ════════════════════════════
   Navigation
   ════════════════════════════ */
function openDashboard(state) {
  const url   = DASHBOARDS[state] || DASHBOARDS[state?.replace("&","and")];
  const isLive = url && url !== "YOUR_POWER_BI_EMBED_URL";

  document.getElementById("map-view").style.display = "none";
  document.getElementById("dash-view").classList.add("active");
  document.getElementById("dash-title").textContent = state;
  document.getElementById("dash-crumb").textContent  = state;

  const body = document.getElementById("dash-body");
  if (isLive) {
    body.innerHTML =
      `<iframe src="${url}" allowfullscreen title="${state} Dashboard"></iframe>`;
  } else {
    body.innerHTML = `
      <div class="placeholder">
        <div class="ph-icon">📊</div>
        <h2>${state} Dashboard</h2>
        <p>
          Replace <code>YOUR_POWER_BI_EMBED_URL</code> for <strong>${state}</strong>
          in the <code>DASHBOARDS</code> config at the top of the script.
        </p>
      </div>`;
  }
}


/* ════════════════════════════
   KPI  ← update numbers here
   ════════════════════════════ */
const KPI_DATA = [
  { value: "4",   label: "States Active"    },
  { value: "42",   label: "Districts Covered"},
  { value: "{value}}", label: "Some KPI"    },
  { value: "24", label: "VTPs"    },
  { value: "3",   label: "Years of Impact"  },
  { value: "1760",    label: "Active VTs"  },
];

(function renderKPIs() {
  const grid = document.getElementById("kpi-grid");
  if (!grid) return;
  grid.innerHTML = KPI_DATA.map(k => `
    <div class="kpi-box">
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-label">${k.label}</div>
    </div>`).join("");
})();
function backToMap() {
  document.getElementById("dash-view").classList.remove("active");
  document.getElementById("map-view").style.display = "";
  document.getElementById("dash-body").innerHTML = "";
}

/* ════════════════════════════
   Init
   ════════════════════════════ */
(async () => {
  const features = await loadGeoJSON();
  mapStatus.style.display = "none";

  if (!features) {
    mapStatus.innerHTML =
      `<p style="color:var(--t2);font-size:13px">
         ⚠️ Map data could not be loaded. Check your internet connection.
       </p>`;
    mapStatus.style.display = "flex";
    return;
  }

  renderMap(features);

  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => renderMap(features), 120);
  });
})();
</script>
